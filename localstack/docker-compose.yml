# localstack/docker-compose.yml
# Runs LocalStack Pro locally to emulate AWS APIs without a real account.

services:
  localstack:
    container_name: localstack-iac-blueprint
    image: localstack/localstack-pro:latest
    ports:
      - "4566:4566"
    env_file:
      - ../.env
    environment:
      - SERVICES=s3,iam,ec2
      - DEBUG=0
      - PERSISTENCE=0
    volumes:
      - localstack_data:/var/lib/localstack
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  localstack_data:
